<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; width: 300px; padding: 16px; background: #fff; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #111; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .row span { font-size: 13px; color: #333; }
    label.field { display: block; font-size: 11px; color: #888; margin-bottom: 3px; margin-top: 10px; letter-spacing: 0.02em; text-transform: uppercase; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 7px 9px; border: 1px solid #e0e0e0; border-radius: 5px;
      font-size: 12px; color: #111; outline: none;
    }
    input:focus { border-color: #2563eb; }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #d1d5db; border-radius: 20px; cursor: pointer; transition: background .2s; }
    .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: transform .2s; }
    input:checked + .slider { background: #2563eb; }
    input:checked + .slider::before { transform: translateX(16px); }
    button { width: 100%; margin-top: 16px; padding: 8px; background: #2563eb; color: #fff; border: none; border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .saved { font-size: 11px; color: #22c55e; margin-top: 8px; text-align: center; min-height: 16px; }
    hr { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0 4px; }
  </style>
</head>
<body>
  <h2>Gaussian Memory</h2>
  <div class="row">
    <span>Enable injection</span>
    <label class="toggle">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>
  <hr>
  <label class="field">Worker URL</label>
  <input type="text" id="workerUrl" placeholder="https://your-worker.workers.dev">
  <label class="field">Auth Token</label>
  <input type="password" id="authToken" placeholder="optional">
  <button id="save">Save</button>
  <div class="saved" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
