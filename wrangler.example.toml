name = "gaussian-memory"
main = "src/index.ts"
compatibility_date = "2025-06-06"
compatibility_flags = ["nodejs_compat"]

# After deploying, set your auth token:
#   wrangler secret put AUTH_TOKEN
# Generate one with: openssl rand -hex 32

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "gaussian-memory"
database_id = "YOUR_D1_DATABASE_ID"
# Create with: wrangler d1 create gaussian-memory

[[vectorize]]
binding = "VECTORIZE"
index_name = "gaussian-memory-index"
# Create with: wrangler vectorize create gaussian-memory-index --dimensions=768 --metric=cosine

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"
# Create with: wrangler kv namespace create gaussian-memory-kv

[triggers]
crons = ["0 6 * * *"]
